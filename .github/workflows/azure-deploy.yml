name: Deploy

on:
  push:
    branches:
      - main

jobs:
  quality-check:
    name: Quality Check
    uses: ./.github/workflows/quality-check.yml
    secrets: inherit
    with:
      node-version: '25.x'

  build_and_deploy:
    needs: quality-check
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Validate EmailJS build secrets
        shell: bash
        env:
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_API_KEY: ${{ secrets.EMAILJS_API_KEY }}
        run: |
          test -n "$VITE_EMAILJS_SERVICE_ID" || { echo "Missing VITE_EMAILJS_SERVICE_ID"; exit 1; }
          test -n "$VITE_EMAILJS_TEMPLATE_ID" || { echo "Missing VITE_EMAILJS_TEMPLATE_ID"; exit 1; }
          test -n "$VITE_EMAILJS_API_KEY" || { echo "Missing VITE_EMAILJS_API_KEY"; exit 1; }
      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_API_KEY: ${{ secrets.EMAILJS_API_KEY }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_HILL_03F366300 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "dist"
