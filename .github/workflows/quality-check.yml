name: Common Quality Checks

on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string

jobs:
  quality_checks:
    runs-on: ubuntu-latest
    name: Run Quality Checks
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
      - name: Validate EmailJS build secrets
        shell: bash
        env:
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_API_KEY: ${{ secrets.EMAILJS_API_KEY }}
        run: |
          test -n "$VITE_EMAILJS_SERVICE_ID" || { echo "Missing VITE_EMAILJS_SERVICE_ID"; exit 1; }
          test -n "$VITE_EMAILJS_TEMPLATE_ID" || { echo "Missing VITE_EMAILJS_TEMPLATE_ID"; exit 1; }
          test -n "$VITE_EMAILJS_API_KEY" || { echo "Missing VITE_EMAILJS_API_KEY"; exit 1; }
      - name: Install Dependencies
        run: npm ci
      - name: Build
        env:
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_API_KEY: ${{ secrets.EMAILJS_API_KEY }}
        run: npm run build
      - name: Run Tests
        run: npm test
      - name: Lint Code
        run: npm run lint
